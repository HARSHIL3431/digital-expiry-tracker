<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Digital Expiry Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="ambient-bg"></div>

    <nav>
        <a href="../v1.html" class="logo">
            <div class="logo-icon"></div>
            ExpiryTracker
        </a>
        <div class="nav-links">
            <a href="../v1.html#features">Platform</a>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-secondary" style="border: none; background: transparent;">Log in</a>
        </div>
    </nav>

    <div class="auth-container reveal">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <h1>Create your account</h1>
                <p>Start tracking your digital assets in seconds</p>
            </div>

            <div id="registerError" class="auth-error">
                Registration failed. Please check your details.
            </div>

            <form id="registerForm">

                <div class="account-type-selector">
                    <label class="account-type-card">
                        <input type="radio" name="accountType" value="company" checked onchange="toggleCompanyField()">
                        <div class="card-content">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                                </path>
                            </svg>
                            <span style="font-weight: 500; font-size: 0.95rem;">Company</span>
                            <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">For teams and
                                organizations</span>
                        </div>
                    </label>
                    <label class="account-type-card">
                        <input type="radio" name="accountType" value="individual" onchange="toggleCompanyField()">
                        <div class="card-content">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span style="font-weight: 500; font-size: 0.95rem;">Individual</span>
                            <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">For personal
                                home use</span>
                        </div>
                    </label>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group" id="companyFieldContainer">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" class="form-control" placeholder="Acme Corp" required>
                </div>

                <div class="form-group">
                    <label for="email" id="emailLabel">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="jane@acme.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password"
                        required minlength="8">
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Create account &rarr;</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        // Minimal reveal animation
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.querySelector('.reveal');
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';

            setTimeout(() => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100);
        });

        // Toggle UI text and inputs based on account type
        function toggleCompanyField() {
            const type = document.querySelector('input[name="accountType"]:checked').value;
            const container = document.getElementById('companyFieldContainer');
            const companyInput = document.getElementById('companyName');
            const emailLabel = document.getElementById('emailLabel');
            const emailInput = document.getElementById('email');

            if (type === 'individual') {
                container.style.display = 'none';
                companyInput.removeAttribute('required');
                emailLabel.textContent = 'Personal Email';
                emailInput.placeholder = 'jane@example.com';
            } else {
                container.style.display = 'block';
                companyInput.setAttribute('required', 'required');
                emailLabel.textContent = 'Work Email';
                emailInput.placeholder = 'jane@acme.com';
            }
        }
    </script>
</body>

</html>
