<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Digital Expiry Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="ambient-bg"></div>

    <nav>
        <a href="../v1.html" class="logo">
            <div class="logo-icon"></div>
            ExpiryTracker
        </a>
        <div class="nav-links">
            <a href="../v1.html#features">Platform</a>
        </div>
        <div class="nav-actions">
            <a href="register.html" class="btn btn-secondary"
                style="border: none; background: transparent;">Register</a>
        </div>
    </nav>

    <div class="auth-container reveal">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome back</h1>
                <p>Log in to your ExpiryTracker account</p>
            </div>

            <div id="loginError" class="auth-error">
                Invalid email or password. Please try again.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control"
                        placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem;">
                    <label
                        style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted); margin: 0;">
                        <input type="checkbox" style="accent-color: var(--accent);">
                        Remember me
                    </label>
                    <a href="#" style="color: var(--accent); text-decoration: none;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Log in &rarr;</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        // Minimal reveal animation
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.querySelector('.reveal');
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';

            setTimeout(() => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>

</html>
